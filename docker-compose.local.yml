# docker-compose.local.yml — Local deployment override (Windows 11 + WSL 2)
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Changes from production:
#   - Nginx: HTTP-only on localhost:80, no TLS, no certs
#   - All ports explicitly 127.0.0.1
#   - Memory limits to stay within WSL 2 allocation (.wslconfig)
#   - GUI container restart policy: run once to deploy files, then stop

services:
  questdb:
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  redis:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  captain-offline:
    volumes:
      - ./scripts:/captain/scripts:ro
      - ./captain-offline/captain_offline:/app/captain_offline:ro
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  captain-online:
    volumes:
      - ./captain-online/captain_online:/app/captain_online:ro
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 768M

  captain-command:
    volumes:
      - ./captain-command/captain_command:/app/captain_command:ro
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  captain-gui:
    restart: "no"

  nginx:
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro
      - gui-dist:/usr/share/nginx/html:ro
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
